# Enable parallel execution
cucumber.execution.parallel.enabled=true

# Strategy: fixed (manual control) or dynamic (based on CPU cores)
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4
cucumber.execution.parallel.config.fixed.max-pool-size=4

cucumber.glue=com.automation.uistepdefinitions, com.automation.hooks
cucumber.plugin=pretty, html:target/cucumber-reports/report.html, json:target/cucumber-reports/report.json
cucumber.execution.dry-run=false
cucumber.filter.tags=@LoginTest